<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Juneja Store - Products</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>Juneja Store</h1>
  <nav>
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="product.html">Products</a>
    <a href="cart.html">Cart</a>
    <a href="contact.html">Contact</a>
  </nav>
</header>

<main>
  <section style="text-align:center; padding: 20px;">
    <h2>Our Products</h2>
    <p>Click on any product to add it to your cart.</p>
  </section>

  <section class="product-grid">
    <div class="product-card">
      <img src="images/product1.jpg" alt="Product 1">
      <h3>Product 1</h3>
      <p>$10</p>
      <button onclick="addToCart('Product 1', 10)">Add to Cart</button>
    </div>
    <div class="product-card">
      <img src="images/product2.jpg" alt="Product 2">
      <h3>Product 2</h3>
      <p>$15</p>
      <button onclick="addToCart('Product 2', 15)">Add to Cart</button>
    </div>
    <div class="product-card">
      <img src="images/product3.jpg" alt="Product 3">
      <h3>Product 3</h3>
      <p>$12</p>
      <button onclick="addToCart('Product 3', 12)">Add to Cart</button>
    </div>
    <div class="product-card">
      <img src="images/product4.jpg" alt="Product 4">
      <h3>Product 4</h3>
      <p>$20</p>
      <button onclick="addToCart('Product 4', 20)">Add to Cart</button>
    </div>
    <!-- Add more products here -->
  </section>
</main>

<footer>
  &copy; 2025 Juneja Store. All rights reserved.
</footer>

<script src="script.js"></script>
</body>
</html>
